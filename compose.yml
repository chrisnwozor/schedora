services:
  postgres:
    image: postgres:16-alpine
    container_name: schedora-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: schedora
      POSTGRES_PASSWORD: schedora
      POSTGRES_DB: schedora

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedora -d schedora"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - schedora-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate

    container_name: schedora-migrate

    env_file:
      - .env.docker

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - schedora-network

  app:
    container_name: schedora-app

    build:
      context: .
      dockerfile: Dockerfile

      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL}
        NEXT_PUBLIC_CLERK_SIGN_OUT_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_OUT_FALLBACK_REDIRECT_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}

    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env.docker

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - schedora-network

volumes:
  postgres_data:

networks:
  schedora-network:
